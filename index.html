<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morse Trainer Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="trainer" aria-labelledby="pageTitle">
        <header class="hero">
          <h1 id="pageTitle">Morse Trainer Pro</h1>
          <p>EA7FMN</p>
        </header>

        <section class="card">
          <div class="settings-grid">
            <label class="control">
              <span>Contenido</span>
              <select id="contentMode">
                <option value="letters">Letras</option>
                <option value="numbers">Numeros</option>
                <option value="mixed">Letras y Numeros</option>
              </select>
            </label>

            <label class="control">
              <span>Modo de partida</span>
              <select id="sessionMode">
                <option value="time">Por tiempo</option>
                <option value="count">Por cantidad</option>
              </select>
            </label>

            <label class="control" id="timeControl">
              <span>Duracion</span>
              <select id="duration">
                <option value="60">1 minuto</option>
                <option value="120">2 minutos</option>
                <option value="300">5 minutos</option>
              </select>
            </label>

            <label class="control is-hidden" id="countControl">
              <span>Caracteres</span>
              <input id="targetCount" type="number" min="5" max="250" step="5" value="30" />
            </label>
          </div>

          <label class="speed-control">
            <span>Velocidad de transmision <strong id="wpmText">27 WPM</strong></span>
            <input id="wpm" type="range" min="8" max="30" step="1" value="27" />
          </label>

          <section class="play-area" aria-live="polite">
            <div class="status-row">
              <div>
                <span>Restante</span>
                <strong id="remaining">1:00</strong>
              </div>
              <div>
                <span>Respondidas</span>
                <strong id="answered">0</strong>
              </div>
              <div>
                <span>Racha</span>
                <strong id="streak">0</strong>
              </div>
            </div>

            <div class="radio" id="radio" aria-hidden="true">
              <div class="antenna"></div>
              <div class="speaker"></div>
              <div class="dial"></div>
            </div>

            <div class="answer-box">
              <label for="answer">Tu respuesta</label>
              <input
                id="answer"
                type="text"
                maxlength="1"
                autocomplete="off"
                autocapitalize="characters"
                disabled
                placeholder="?"
              />
              <p id="feedback">Pulsa empezar para escuchar el primer codigo.</p>
            </div>

            <div class="actions">
              <button id="start" class="button primary" type="button">Empezar</button>
              <button id="repeat" class="button dark" type="button" disabled>Repetir sonido</button>
              <button id="reset" class="button quiet" type="button" disabled>Reiniciar</button>
            </div>
          </section>

          <section class="score-grid" aria-label="Marcador">
            <div>
              <span>Aciertos</span>
              <strong class="ok" id="correct">0</strong>
            </div>
            <div>
              <span>Fallos</span>
              <strong class="bad" id="wrong">0</strong>
            </div>
            <div>
              <span>Efectividad</span>
              <strong class="blue" id="accuracy">0%</strong>
            </div>
            <div>
              <span>Aciertos/min</span>
              <strong id="rate">0</strong>
            </div>
          </section>

          <section class="review">
            <div class="review-title">
              <h2>Ultimas respuestas</h2>
              <span id="signalState">Preparado</span>
            </div>
            <ol id="history" aria-label="Ultimas respuestas"></ol>
          </section>
        </section>
      </section>

      <dialog id="summary" class="summary">
        <section>
          <span>Resumen final</span>
          <h2 id="summaryTitle">Partida terminada</h2>
          <div class="summary-grid">
            <div><small>Aciertos</small><strong id="sumCorrect">0</strong></div>
            <div><small>Fallos</small><strong id="sumWrong">0</strong></div>
            <div><small>Efectividad</small><strong id="sumAccuracy">0%</strong></div>
            <div><small>Aciertos/min</small><strong id="sumRate">0</strong></div>
          </div>
          <p id="summaryText"></p>
          <button id="closeSummary" class="button primary" type="button">Nueva partida</button>
        </section>
      </dialog>
    </main>

    <script src="app.js"></script>
  </body>
</html>
